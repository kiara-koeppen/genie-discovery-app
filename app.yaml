# Databricks App config for Genie Discovery
#
# BEFORE DEPLOYING TO YOUR WORKSPACE, update the four env vars below to match
# your environment. See README.md ("Deploy to your workspace") for details.

command:
  - python
  - app.py

# NOTE: OAuth scopes for the end-user OBO token are NOT set in app.yaml (the
# key is silently ignored). See README.md "Step 2b" for the `databricks apps
# update` command to configure user_api_scopes.

env:
  # REQUIRED. SQL Warehouse used for all UC metadata queries and engagement
  # storage. Find this in your workspace: SQL > SQL Warehouses > (select
  # warehouse) > Connection details > copy the ID from the end of the HTTP Path.
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<your-warehouse-id>"

  # REQUIRED. Catalog where the engagement-storage Delta table lives.
  # The app's service principal must have CREATE TABLE on <CATALOG>.<SCHEMA>.
  - name: CATALOG
    value: "<your-catalog>"

  # REQUIRED. Schema under CATALOG where the engagement table is auto-created.
  # The schema must exist before first run; the table itself is created and
  # maintained automatically by ensure_columns() on app startup.
  - name: SCHEMA
    value: "<your-schema>"

  # Optional. Databricks group whose members gate COE approval in Session 4.
  # Create this group in Account Console > User management > Groups, add your
  # COE reviewers as members, then put the group name here.
  - name: COE_GROUP_NAME
    value: "genie-coe-reviewers"

  # Optional. Model Serving endpoint used by every AI button (generate-plan,
  # draft-benchmarks, draft-metric-view-yaml, etc). Default is the HIPAA-
  # eligible pay-per-token Claude endpoint. The app's service principal
  # needs CAN QUERY on this endpoint.
  # Alternatives: databricks-claude-3-7-sonnet, databricks-gpt-oss-120b, or
  # any chat-completion-compatible served model.
  - name: LLM_ENDPOINT_NAME
    value: "databricks-claude-sonnet-4-6"
